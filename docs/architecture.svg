<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <rect width="900" height="520" fill="#f8f9fa" rx="8"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e1e1e">claude_ML_project3 — MLflow Model Registry</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#6c757d">MLflow + PostgreSQL + MinIO on Kubernetes</text>

  <!-- Browser -->
  <rect x="370" y="75" width="160" height="45" fill="#a5d8ff" rx="6" stroke="#4a9eed"/>
  <text x="450" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">Browser / Jupyter</text>
  <text x="450" y="111" text-anchor="middle" font-size="11" fill="#1e3a5f">localhost:30085</text>
  <line x1="450" y1="120" x2="450" y2="155" stroke="#4a9eed" stroke-width="2" marker-end="url(#arr)"/>

  <!-- NodePort -->
  <rect x="340" y="155" width="220" height="45" fill="#c3fae8" rx="6" stroke="#0d9488"/>
  <text x="450" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f766e">NodePort Service</text>
  <text x="450" y="190" text-anchor="middle" font-size="11" fill="#0f766e">Port 30085 → 5000 | Ingress: mlflow.local</text>
  <line x1="450" y1="200" x2="450" y2="230" stroke="#0d9488" stroke-width="2"/>

  <!-- MLflow box -->
  <rect x="300" y="230" width="300" height="75" fill="#d0bfff" rx="6" stroke="#8b5cf6" stroke-width="2"/>
  <text x="450" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d1b69">MLflow Tracking Server</text>
  <text x="450" y="271" text-anchor="middle" font-size="12" fill="#2d1b69">Image: ghcr.io/mlflow/mlflow:v2.9.2</text>
  <text x="450" y="286" text-anchor="middle" font-size="11" fill="#2d1b69">Port: 5000 | Namespace: mlflow</text>

  <!-- Lines to PG and Minio -->
  <line x1="340" y1="305" x2="200" y2="365" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="560" y1="305" x2="700" y2="365" stroke="#8b5cf6" stroke-width="2"/>

  <!-- PostgreSQL -->
  <rect x="80" y="365" width="240" height="90" fill="#a5d8ff" rx="6" stroke="#4a9eed" stroke-width="2"/>
  <text x="200" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">PostgreSQL 15</text>
  <text x="200" y="407" text-anchor="middle" font-size="11" fill="#1e3a5f">Backend Metadata Store</text>
  <text x="200" y="422" text-anchor="middle" font-size="11" fill="#1e3a5f">DB: mlflow | Port: 5432</text>
  <text x="200" y="437" text-anchor="middle" font-size="11" fill="#1e3a5f">PVC: 5Gi (hostpath)</text>

  <!-- MinIO -->
  <rect x="580" y="365" width="240" height="90" fill="#b2f2bb" rx="6" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">MinIO</text>
  <text x="700" y="407" text-anchor="middle" font-size="11" fill="#14532d">S3 Artifact Store</text>
  <text x="700" y="422" text-anchor="middle" font-size="11" fill="#14532d">Bucket: mlflow-artifacts</text>
  <text x="700" y="437" text-anchor="middle" font-size="11" fill="#14532d">PVC: 10Gi | Console: 30090</text>

  <!-- Labels -->
  <text x="260" y="345" text-anchor="middle" font-size="11" fill="#6d28d9">backend-store-uri</text>
  <text x="640" y="345" text-anchor="middle" font-size="11" fill="#6d28d9">default-artifact-root</text>

  <!-- Jupyter integration note -->
  <rect x="100" y="475" width="700" height="30" fill="#fff3bf" rx="5" stroke="#f59e0b"/>
  <text x="450" y="494" text-anchor="middle" font-size="12" fill="#713f12">From Jupyter: mlflow.set_tracking_uri("http://mlflow.mlflow.svc.cluster.local:5000")</text>

  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#4a9eed"/></marker></defs>
</svg>