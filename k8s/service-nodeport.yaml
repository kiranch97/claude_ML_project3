apiVersion: v1
kind: Service
metadata:
  name: mlflow-nodeport
  namespace: mlflow
  labels:
    app: mlflow
    project: claude-ml-project3
spec:
  type: NodePort
  selector:
    app: mlflow
  ports:
  - name: mlflow
    port: 5000
    targetPort: 5000
    nodePort: 30085   # Access MLflow UI at http://localhost:30085
    protocol: TCP
